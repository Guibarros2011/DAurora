<!-- SCRIPT A ADICIONAR antes do </body> do admin.html -->
<script id="patch-script-mapa">
// ── Configuração ────────────────────────────────────────────────────────────
var R2_BASE   = 'https://pub-45a49d6ca0624c49b17b329f06171787.r2.dev';
var TILES_URL = R2_BASE + '/tiles/tiles/';
var _pendingCoords = null; // {x, y} normalizadas (0-1) aguardando modal

var TIPO_ICONE = {
  'Cidade':'🏙️','Porto':'⚓','Ilha':'🏝️','Mar / Oceano':'🌊',
  'Montanha':'⛰️','Floresta':'🌿','Ruína':'🏚️','Fortaleza':'🏰',
  'Sagrado':'✨','Submerso':'🌊','Desconhecido':'📍',
};

// ── OpenSeadragon ────────────────────────────────────────────────────────────
var viewer;

function initMapa() {
  if (viewer) return;

  fetch(TILES_URL + 'info.json')
    .then(function(r) { return r.json(); })
    .then(function(info) {
      viewer = OpenSeadragon({
        id:                  'openseadragon-map',
        prefixUrl:           'https://cdnjs.cloudflare.com/ajax/libs/openseadragon/3.1.0/images/',
        tileSources:         {
          type:          'legacy-image-pyramid',
          levels:        buildLevels(info),
        },
        showNavigationControl: true,
        animationTime:       0.4,
        minZoomImageRatio:   0.5,
        maxZoomPixelRatio:   4,
        defaultZoomLevel:    1,
      });

      // Clique no mapa → abre modal
      viewer.addHandler('canvas-click', function(e) {
        if (!e.quick) return;
        var wrap = document.getElementById('osd-map-wrap');

        // Converte coordenadas de viewport para imagem normalizada
        var webPoint   = viewer.viewport.pointFromPixel(e.position);
        var imagePoint = viewer.viewport.viewportToImageCoordinates(webPoint);
        var imgSize    = viewer.world.getItemAt(0).getContentSize();

        var xNorm = imagePoint.x / imgSize.x;
        var yNorm = imagePoint.y / imgSize.y;

        _pendingCoords = { x: xNorm, y: yNorm, px: imagePoint.x, py: imagePoint.y };
        abrirModal(_pendingCoords);
      });

      // Carrega pins existentes
      carregarPins();
    })
    .catch(function(e) {
      console.error('Erro ao iniciar mapa:', e);
    });
}

function buildLevels(info) {
  // info.json gerado pelo tiler
  if (info.levels) return info.levels;
  // Fallback: reconstrói do info padrão
  var levels = [];
  for (var i = 0; i < info.tiles.length; i++) {
    var t = info.tiles[i];
    levels.push({
      url:         TILES_URL + t.path,
      width:       t.width,
      height:      t.height,
    });
  }
  return levels;
}

// ── Pins ──────────────────────────────────────────────────────────────────────

function carregarPins() {
  fetch(R2_BASE + '/marcadores.json?_=' + Date.now())
    .then(function(r) { return r.ok ? r.json() : { marcadores: [] }; })
    .then(function(data) {
      (data.marcadores || []).forEach(renderPin);
    })
    .catch(function() {});
}

function renderPin(loc) {
  if (loc.x == null || loc.y == null) return;

  var imgSize = viewer.world.getItemAt(0).getContentSize();

  // Coordenadas normalizadas → viewport
  var imgPoint  = new OpenSeadragon.Point(loc.x * imgSize.x, loc.y * imgSize.y);
  var vpPoint   = viewer.viewport.imageToViewportCoordinates(imgPoint);

  var overlay = document.createElement('div');
  overlay.className = 'osd-pin';
  overlay.id = 'pin-' + loc.id;
  overlay.title = loc.nome;

  var icone = TIPO_ICONE[loc.tipo] || '📍';
  overlay.innerHTML =
    '<div class="osd-pin-icon">' + icone + '</div>' +
    '<div class="osd-pin-label">' + loc.nome + '</div>';

  overlay.addEventListener('click', function(e) {
    e.stopPropagation();
    window.open('/locacao.html?id=' + loc.id, '_blank');
  });

  viewer.addOverlay({
    element:  overlay,
    location: vpPoint,
    placement: OpenSeadragon.Placement.BOTTOM_CENTER,
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────────

function abrirModal(coords) {
  document.getElementById('modal-pin-overlay').style.display = 'flex';
  document.getElementById('modal-pin-status').textContent = '';
  document.getElementById('modal-coords-display').textContent =
    'Posição no mapa: x=' + Math.round(coords.px) + '  y=' + Math.round(coords.py);
  document.getElementById('pin-nome').focus();
}

function fecharModal() {
  document.getElementById('modal-pin-overlay').style.display = 'none';
  _pendingCoords = null;
  // Limpa campos
  ['pin-nome','pin-tipo','pin-capitulo','pin-descricao','pin-personagens','pin-local-real']
    .forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.value = '';
    });
}

function salvarPin() {
  var nome = document.getElementById('pin-nome').value.trim();
  if (!nome) {
    document.getElementById('modal-pin-status').textContent = 'O nome da locação é obrigatório.';
    return;
  }
  if (!_pendingCoords) {
    document.getElementById('modal-pin-status').textContent = 'Nenhuma posição selecionada.';
    return;
  }

  var personagensRaw = document.getElementById('pin-personagens').value;
  var personagens = personagensRaw
    ? personagensRaw.split(',').map(function(s) { return s.trim(); }).filter(Boolean)
    : [];

  var payload = {
    nome:       nome,
    tipo:       document.getElementById('pin-tipo').value || null,
    capitulo:   document.getElementById('pin-capitulo').value.trim() || null,
    descricao:  document.getElementById('pin-descricao').value.trim() || null,
    personagens: personagens,
    localReal:  document.getElementById('pin-local-real').value.trim() || null,
    x:          _pendingCoords.x,
    y:          _pendingCoords.y,
  };

  var statusEl = document.getElementById('modal-pin-status');
  var btnSalvar = document.querySelector('.btn-modal-primary');
  statusEl.textContent = 'Criando locação e página no Notion…';
  btnSalvar.disabled = true;

  fetch('/api/marcadores', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(payload),
  })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error);

      statusEl.textContent = '✅ Locação criada! Abrindo ficha…';
      renderPin(data.marcador);

      setTimeout(function() {
        fecharModal();
        window.open('/locacao.html?id=' + data.marcador.id, '_blank');
      }, 1200);
    })
    .catch(function(e) {
      statusEl.textContent = '⚠️ Erro: ' + e.message;
      btnSalvar.disabled = false;
    });
}

// ── Inicia quando o tab Mapa é ativado ────────────────────────────────────────
// Adapte o seletor ao evento que o seu admin.html já usa para trocar de tab.
// Se o tab Mapa tiver id="tab-mapa", use:
document.addEventListener('DOMContentLoaded', function() {
  // Observa cliques no botão/aba do mapa
  var tabBtn = document.querySelector('[data-tab="mapa"]') ||
               document.querySelector('#tab-mapa')        ||
               document.querySelector('.tab-btn.mapa');
  if (tabBtn) {
    tabBtn.addEventListener('click', function() {
      setTimeout(initMapa, 100);
    });
  } else {
    // Fallback: inicia direto se o mapa já estiver visível
    if (document.getElementById('openseadragon-map')) {
      setTimeout(initMapa, 300);
    }
  }
});
</script>
